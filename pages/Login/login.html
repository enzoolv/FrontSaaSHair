<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../../assets/Css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
    <div class="bg"></div>
    <main class="page">

    <section class="esq">
        <span class="tag">Bem-vindo de volta</span>
        <h1>Entre na sua<br><em>conta agora.</em></h1>
        <p>Acesse todos os seus recursos e configurações em um só lugar.</p>
        <a href="../index.html" class="back-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Voltar para o início
        </a>
    </section>
        <section class="login">
            <div class="bg-dir"></div>
            <form>
                <h1>Entrar</h1>
                <div class="inputs">
                    <label for="email">E-mail</label>
                    <input id="email" name="email" type="email" placeholder="SeuEmail@gmail.com" required>

                    <label for="senha">Senha</label>
                    <input id="senha" name="senha" type="password" placeholder="••••••••" required>
                    <a href="recuperar-senha.html" class="forgot">Esqueceu a senha?</a>
                    <button type="submit">Entrar</button>
                    <div class="divider">ou</div>
    
                    <p class="signup-nudge">
                    Ainda não tem conta? <a href="cadastro.html">Cadastre-se</a>
                    </p>
                </div>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
